<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#131318"/>
      <stop offset="100%" stop-color="#18181E"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bg)"/>
  <!-- cluster dots - group 1 (purple) -->
  <circle cx="160" cy="110" r="8" fill="#6C63FF" fill-opacity="0.8"/>
  <circle cx="185" cy="130" r="6" fill="#6C63FF" fill-opacity="0.7"/>
  <circle cx="140" cy="135" r="7" fill="#6C63FF" fill-opacity="0.75"/>
  <circle cx="170" cy="155" r="5" fill="#6C63FF" fill-opacity="0.6"/>
  <circle cx="200" cy="120" r="5" fill="#6C63FF" fill-opacity="0.65"/>
  <circle cx="150" cy="160" r="6" fill="#6C63FF" fill-opacity="0.55"/>
  <circle cx="180" cy="105" r="4" fill="#6C63FF" fill-opacity="0.5"/>
  <!-- cluster center 1 -->
  <circle cx="168" cy="133" r="22" fill="none" stroke="#6C63FF" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="4 3"/>
  <!-- cluster dots - group 2 (teal) -->
  <circle cx="340" cy="90" r="7" fill="#00D4AA" fill-opacity="0.8"/>
  <circle cx="365" cy="110" r="6" fill="#00D4AA" fill-opacity="0.7"/>
  <circle cx="320" cy="115" r="5" fill="#00D4AA" fill-opacity="0.75"/>
  <circle cx="350" cy="130" r="8" fill="#00D4AA" fill-opacity="0.6"/>
  <circle cx="375" cy="95" r="4" fill="#00D4AA" fill-opacity="0.65"/>
  <circle cx="330" cy="100" r="6" fill="#00D4AA" fill-opacity="0.55"/>
  <!-- cluster center 2 -->
  <circle cx="348" cy="107" r="22" fill="none" stroke="#00D4AA" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="4 3"/>
  <!-- cluster dots - group 3 (pink) -->
  <circle cx="250" cy="195" r="7" fill="#FF6B9D" fill-opacity="0.8"/>
  <circle cx="275" cy="175" r="5" fill="#FF6B9D" fill-opacity="0.7"/>
  <circle cx="230" cy="180" r="6" fill="#FF6B9D" fill-opacity="0.75"/>
  <circle cx="265" cy="210" r="5" fill="#FF6B9D" fill-opacity="0.6"/>
  <circle cx="240" cy="165" r="4" fill="#FF6B9D" fill-opacity="0.5"/>
  <!-- cluster center 3 -->
  <circle cx="252" cy="190" r="22" fill="none" stroke="#FF6B9D" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="4 3"/>
  <!-- noise dots (grey/scattered) -->
  <circle cx="90" cy="200" r="3" fill="#8B8B95" fill-opacity="0.5"/>
  <circle cx="420" cy="180" r="3" fill="#8B8B95" fill-opacity="0.5"/>
  <circle cx="110" cy="85" r="2" fill="#8B8B95" fill-opacity="0.4"/>
  <circle cx="450" cy="130" r="4" fill="#8B8B95" fill-opacity="0.4"/>
  <circle cx="70" cy="155" r="2" fill="#8B8B95" fill-opacity="0.35"/>
  <!-- right panel: algo labels -->
  <rect x="520" y="80" width="220" height="140" rx="10" fill="#18181E" stroke="#2A2A35" stroke-width="1"/>
  <text x="630" y="105" text-anchor="middle" font-family="monospace" font-size="11" fill="#8B8B95" letter-spacing="1">ALGORITHM</text>
  <rect x="540" y="115" width="80" height="24" rx="6" fill="#6C63FF" fill-opacity="0.2" stroke="#6C63FF" stroke-width="1"/>
  <text x="580" y="131" text-anchor="middle" font-family="monospace" font-size="10" fill="#9B8FFF">K-Means</text>
  <rect x="540" y="147" width="80" height="24" rx="6" fill="#00D4AA" fill-opacity="0.12" stroke="#00D4AA" stroke-width="1"/>
  <text x="580" y="163" text-anchor="middle" font-family="monospace" font-size="10" fill="#00D4AA">DBSCAN</text>
  <text x="660" y="128" font-family="monospace" font-size="10" fill="#8B8B95">k = 3</text>
  <text x="660" y="148" font-family="monospace" font-size="10" fill="#8B8B95">ε = 0.5</text>
  <text x="660" y="165" font-family="monospace" font-size="10" fill="#8B8B95">minPts = 4</text>
  <line x1="640" y1="115" x2="640" y2="200" stroke="#2A2A35" stroke-width="1"/>
  <!-- title badge -->
  <rect x="310" y="248" width="180" height="28" rx="14" fill="#6C63FF" fill-opacity="0.15" stroke="#6C63FF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="400" y="267" text-anchor="middle" font-family="monospace" font-size="11" fill="#6C63FF" letter-spacing="1">ML / CLUSTERING</text>
</svg>
