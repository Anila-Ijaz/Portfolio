      <stop offset="0%" stop-color="#131318"/>
      <stop offset="100%" stop-color="#18181E"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bg)"/>
  <!-- documents stack -->
  <rect x="40" y="80" width="90" height="120" rx="6" fill="#1e1e2a" stroke="#2A2A35" stroke-width="1.5"/>
