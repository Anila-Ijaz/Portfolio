  <text x="105" y="114" text-anchor="middle" font-family="monospace" font-size="8" fill="#8B8B95">invoice.pdf</text>
  <text x="105" y="128" text-anchor="middle" font-family="monospace" font-size="8" fill="#8B8B95">service.pdf</text>
  <text x="105" y="142" text-anchor="middle" font-family="monospace" font-size="8" fill="#8B8B95">report.pdf</text>
  <line x1="72" y1="152" x2="138" y2="152" stroke="#2A2A35" stroke-width="1"/>
