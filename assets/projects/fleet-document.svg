<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#131318"/>
      <stop offset="100%" stop-color="#18181E"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bg)"/>

  <!-- Left: React UI + n8n -->
  <rect x="18" y="52" width="118" height="58" rx="7" fill="#1a1a2e" stroke="#6C63FF" stroke-width="1.5"/>
  <text x="77" y="72" text-anchor="middle" font-family="monospace" font-size="8" fill="#9B8FFF" font-weight="600">React UI</text>
  <text x="77" y="86" text-anchor="middle" font-family="monospace" font-size="7" fill="#8B8B95">upload · list</text>
  <text x="77" y="99" text-anchor="middle" font-family="monospace" font-size="7" fill="#8B8B95">chat · review</text>

  <rect x="18" y="126" width="118" height="42" rx="7" fill="#1a1a2e" stroke="#9B8FFF" stroke-width="1.2"/>
  <text x="77" y="145" text-anchor="middle" font-family="monospace" font-size="8" fill="#9B8FFF" font-weight="600">n8n workflow</text>
  <text x="77" y="159" text-anchor="middle" font-family="monospace" font-size="7" fill="#8B8B95">orchestration</text>

  <!-- Arrows -->
  <line x1="138" y1="81" x2="162" y2="81" stroke="#6C63FF" stroke-width="1.2" stroke-dasharray="3 2"/>
  <polygon points="162,78 167,81 162,84" fill="#6C63FF"/>
  <line x1="138" y1="147" x2="162" y2="147" stroke="#9B8FFF" stroke-width="1.2" stroke-dasharray="3 2"/>
  <polygon points="162,144 167,147 162,150" fill="#9B8FFF"/>

  <!-- FastAPI Services box -->
  <rect x="168" y="34" width="390" height="206" rx="10" fill="#0d1f0d" stroke="#00D4AA" stroke-width="1"/>
  <text x="363" y="52" text-anchor="middle" font-family="monospace" font-size="8" fill="#00D4AA" font-weight="600">FastAPI Services</text>
  <line x1="180" y1="59" x2="546" y2="59" stroke="#1a3a1a" stroke-width="1"/>

  <!-- Extraction -->
  <rect x="180" y="66" width="168" height="46" rx="5" fill="#083a2a" stroke="#5DCAA5" stroke-width="1"/>
  <text x="264" y="84" text-anchor="middle" font-family="monospace" font-size="8" fill="#9FE1CB" font-weight="500">Extraction service</text>
  <text x="264" y="99" text-anchor="middle" font-family="monospace" font-size="7" fill="#5DCAA5">LangChain · Pydantic v2</text>

  <!-- RAG chatbot -->
  <rect x="360" y="66" width="168" height="46" rx="5" fill="#083a2a" stroke="#5DCAA5" stroke-width="1"/>
  <text x="444" y="84" text-anchor="middle" font-family="monospace" font-size="8" fill="#9FE1CB" font-weight="500">RAG chatbot</text>
  <text x="444" y="99" text-anchor="middle" font-family="monospace" font-size="7" fill="#5DCAA5">pgvector · English Q&amp;A</text>

  <!-- connector -->
  <line x1="350" y1="89" x2="358" y2="89" stroke="#5DCAA5" stroke-width="1"/>
  <polygon points="358,86 362,89 358,92" fill="#5DCAA5"/>

  <!-- LangGraph agent -->
  <rect x="180" y="126" width="168" height="46" rx="5" fill="#1a3a00" stroke="#EF9F27" stroke-width="1"/>
  <text x="264" y="144" text-anchor="middle" font-family="monospace" font-size="8" fill="#FAC775" font-weight="500">LangGraph agent</text>
  <text x="264" y="159" text-anchor="middle" font-family="monospace" font-size="7" fill="#EF9F27">triage · approve · escalate</text>

  <!-- OpenAI -->
  <rect x="360" y="126" width="168" height="46" rx="5" fill="#1a2a3a" stroke="#4A90D9" stroke-width="1"/>
  <text x="444" y="144" text-anchor="middle" font-family="monospace" font-size="8" fill="#85C1E9" font-weight="500">OpenAI / LLM layer</text>
  <text x="444" y="159" text-anchor="middle" font-family="monospace" font-size="7" fill="#4A90D9">gpt-4o-mini · embeddings</text>

  <!-- connector -->
  <line x1="350" y1="149" x2="358" y2="149" stroke="#EF9F27" stroke-width="1"/>
  <polygon points="358,146 362,149 358,152" fill="#EF9F27"/>

  <!-- DB -->
  <rect x="180" y="192" width="348" height="20" rx="5" fill="#1a1a3a" stroke="#6C63FF" stroke-width="1"/>
  <text x="354" y="205" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#9B8FFF" font-weight="500">PostgreSQL 18 + pgvector — documents · embeddings · sessions</text>

  <!-- DB arrows -->
  <line x1="264" y1="174" x2="264" y2="190" stroke="#6C63FF" stroke-width="1" stroke-dasharray="3 2"/>
  <polygon points="261,190 264,194 267,190" fill="#6C63FF"/>
  <line x1="444" y1="174" x2="444" y2="190" stroke="#6C63FF" stroke-width="1" stroke-dasharray="3 2"/>
  <polygon points="441,190 444,194 447,190" fill="#6C63FF"/>

  <!-- Right: Deployment panel -->
  <rect x="572" y="44" width="210" height="196" rx="8" fill="#18181E" stroke="#2A2A35" stroke-width="1"/>
  <text x="677" y="63" text-anchor="middle" font-family="monospace" font-size="8" fill="#8B8B95" letter-spacing="1">DEPLOYMENT</text>
  <line x1="582" y1="70" x2="772" y2="70" stroke="#2A2A35" stroke-width="1"/>

  <!-- Render badge -->
  <rect x="582" y="79" width="190" height="24" rx="5" fill="#0a1a0a" stroke="#00D4AA" stroke-width="0.8"/>
  <text x="677" y="95" text-anchor="middle" font-family="monospace" font-size="8" fill="#00D4AA">☁ Render · Frankfurt</text>

  <!-- Docker -->
  <rect x="582" y="109" width="190" height="24" rx="5" fill="#0a1a0a" stroke="#5DCAA5" stroke-width="0.8"/>
  <text x="677" y="125" text-anchor="middle" font-family="monospace" font-size="8" fill="#9FE1CB">🐳 Docker · 4 services</text>

  <!-- PostgreSQL -->
  <rect x="582" y="139" width="190" height="24" rx="5" fill="#1a1a2e" stroke="#6C63FF" stroke-width="0.8"/>
  <text x="677" y="155" text-anchor="middle" font-family="monospace" font-size="8" fill="#9B8FFF">🗄 PostgreSQL 18 · Render</text>

  <!-- GitHub Actions -->
  <rect x="582" y="169" width="190" height="24" rx="5" fill="#1a1a2e" stroke="#9B8FFF" stroke-width="0.8"/>
  <text x="677" y="185" text-anchor="middle" font-family="monospace" font-size="8" fill="#9B8FFF">⚙ GitHub Actions CI</text>

  <line x1="582" y1="202" x2="772" y2="202" stroke="#2A2A35" stroke-width="1"/>
  <text x="677" y="216" text-anchor="middle" font-family="monospace" font-size="7" fill="#8B8B95">7 phases · 16 tests · 1-cmd start</text>
  <text x="677" y="229" text-anchor="middle" font-family="monospace" font-size="7" fill="#6C63FF">provider-agnostic LLM layer</text>

  <!-- Badge -->
  <rect x="232" y="256" width="336" height="26" rx="13" fill="#6C63FF" fill-opacity="0.15" stroke="#6C63FF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="400" y="273" text-anchor="middle" font-family="monospace" font-size="10" fill="#6C63FF" letter-spacing="1">RAG · LANGGRAPH · RENDER · DOCKER</text>
</svg>
