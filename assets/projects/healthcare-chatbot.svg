<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#131318"/>
      <stop offset="100%" stop-color="#18181E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#00D4AA"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bg)"/>
  <!-- grid lines -->
  <line x1="0" y1="60" x2="800" y2="60" stroke="#2A2A35" stroke-width="1"/>
  <line x1="0" y1="120" x2="800" y2="120" stroke="#2A2A35" stroke-width="1"/>
  <line x1="0" y1="180" x2="800" y2="180" stroke="#2A2A35" stroke-width="1"/>
  <line x1="0" y1="240" x2="800" y2="240" stroke="#2A2A35" stroke-width="1"/>
  <line x1="133" y1="0" x2="133" y2="300" stroke="#2A2A35" stroke-width="1"/>
  <line x1="266" y1="0" x2="266" y2="300" stroke="#2A2A35" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="300" stroke="#2A2A35" stroke-width="1"/>
  <line x1="533" y1="0" x2="533" y2="300" stroke="#2A2A35" stroke-width="1"/>
  <line x1="666" y1="0" x2="666" y2="300" stroke="#2A2A35" stroke-width="1"/>
  <!-- chat bubbles decoration -->
  <rect x="60" y="70" width="200" height="40" rx="20" fill="#6C63FF" fill-opacity="0.15" stroke="#6C63FF" stroke-width="1" stroke-opacity="0.3"/>
  <text x="160" y="95" text-anchor="middle" font-family="monospace" font-size="12" fill="#8B8B95">User: What are symptoms…</text>
  <rect x="540" y="70" width="200" height="40" rx="20" fill="#00D4AA" fill-opacity="0.1" stroke="#00D4AA" stroke-width="1" stroke-opacity="0.25"/>
  <text x="640" y="95" text-anchor="middle" font-family="monospace" font-size="12" fill="#8B8B95">RAG → LLM → Response</text>
  <!-- pipeline arrows -->
  <rect x="80" y="150" width="120" height="36" rx="8" fill="#6C63FF" fill-opacity="0.2" stroke="#6C63FF" stroke-width="1"/>
  <text x="140" y="172" text-anchor="middle" font-family="monospace" font-size="11" fill="#9B8FFF">Retrieval</text>
  <text x="230" y="172" text-anchor="middle" font-family="monospace" font-size="14" fill="#6C63FF">→</text>
  <rect x="250" y="150" width="120" height="36" rx="8" fill="#6C63FF" fill-opacity="0.2" stroke="#6C63FF" stroke-width="1"/>
  <text x="310" y="172" text-anchor="middle" font-family="monospace" font-size="11" fill="#9B8FFF">Augment</text>
  <text x="400" y="172" text-anchor="middle" font-family="monospace" font-size="14" fill="#6C63FF">→</text>
  <rect x="420" y="150" width="120" height="36" rx="8" fill="#00D4AA" fill-opacity="0.15" stroke="#00D4AA" stroke-width="1"/>
  <text x="480" y="172" text-anchor="middle" font-family="monospace" font-size="11" fill="#00D4AA">Generate</text>
  <text x="570" y="172" text-anchor="middle" font-family="monospace" font-size="14" fill="#00D4AA">→</text>
  <rect x="590" y="150" width="120" height="36" rx="8" fill="#00D4AA" fill-opacity="0.15" stroke="#00D4AA" stroke-width="1"/>
  <text x="650" y="172" text-anchor="middle" font-family="monospace" font-size="11" fill="#00D4AA">FastAPI</text>
  <!-- title badge -->
  <rect x="310" y="230" width="180" height="28" rx="14" fill="#6C63FF" fill-opacity="0.15" stroke="#6C63FF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="400" y="248" text-anchor="middle" font-family="monospace" font-size="11" fill="#6C63FF" letter-spacing="1">LLM + RAG PIPELINE</text>
</svg>
