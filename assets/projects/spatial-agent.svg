<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#131318"/>
      <stop offset="100%" stop-color="#18181E"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bg)"/>
  <!-- Streamlit UI -->
  <rect x="18" y="60" width="118" height="62" rx="7" fill="#1e1929" stroke="#6C63FF" stroke-width="1.5"/>
  <text x="77" y="79" text-anchor="middle" font-family="monospace" font-size="8" fill="#9B8FFF" font-weight="600">Streamlit UI</text>
  <text x="77" y="93" text-anchor="middle" font-family="monospace" font-size="7" fill="#8B8B95">📸 Upload photo</text>
  <text x="77" y="107" text-anchor="middle" font-family="monospace" font-size="7" fill="#8B8B95">💬 Chat · stream</text>
  <!-- HTTP -->
  <line x1="138" y1="91" x2="168" y2="91" stroke="#8B8B95" stroke-width="1.2" stroke-dasharray="3 2"/>
  <polygon points="168,88 173,91 168,94" fill="#8B8B95"/>
  <text x="153" y="86" text-anchor="middle" font-family="monospace" font-size="6" fill="#8B8B95">HTTP</text>
  <!-- FastAPI container -->
  <rect x="174" y="36" width="390" height="214" rx="10" fill="#0a2a3a" stroke="#4A90D9" stroke-width="1"/>
  <text x="369" y="53" text-anchor="middle" font-family="monospace" font-size="8" fill="#85C1E9" font-weight="600">FastAPI · port 8001</text>
  <line x1="186" y1="60" x2="552" y2="60" stroke="#1a4a6a" stroke-width="1"/>
  <!-- LangGraph -->
  <rect x="186" y="68" width="175" height="46" rx="5" fill="#083a2a" stroke="#5DCAA5" stroke-width="1"/>
  <text x="274" y="86" text-anchor="middle" font-family="monospace" font-size="8" fill="#9FE1CB" font-weight="500">LangGraph pipeline</text>
  <text x="274" y="101" text-anchor="middle" font-family="monospace" font-size="7" fill="#5DCAA5">vision → context → narration</text>
  <!-- Intent router -->
  <rect x="372" y="68" width="175" height="46" rx="5" fill="#083a2a" stroke="#5DCAA5" stroke-width="1"/>
  <text x="460" y="86" text-anchor="middle" font-family="monospace" font-size="8" fill="#9FE1CB" font-weight="500">Intent router</text>
  <text x="460" y="101" text-anchor="middle" font-family="monospace" font-size="7" fill="#5DCAA5">keyword + GPT routing</text>
  <!-- connector arrow -->
  <line x1="363" y1="91" x2="370" y2="91" stroke="#5DCAA5" stroke-width="1"/>
  <polygon points="370,88 374,91 370,94" fill="#5DCAA5"/>
  <!-- Tools -->
  <rect x="186" y="128" width="175" height="64" rx="5" fill="#3a2200" stroke="#EF9F27" stroke-width="1"/>
  <text x="274" y="146" text-anchor="middle" font-family="monospace" font-size="8" fill="#FAC775" font-weight="500">Tools</text>
  <text x="274" y="160" text-anchor="middle" font-family="monospace" font-size="7" fill="#EF9F27">RAG · reverse geocode</text>
  <text x="274" y="174" text-anchor="middle" font-family="monospace" font-size="7" fill="#EF9F27">web search · nearby</text>
  <!-- CLIP -->
  <rect x="372" y="128" width="175" height="28" rx="5" fill="#4a1a0a" stroke="#F0997B" stroke-width="1"/>
  <text x="460" y="146" text-anchor="middle" font-family="monospace" font-size="8" fill="#F5C4B3" font-weight="500">CLIP ViT-B/32 · vision</text>
  <!-- Session memory -->
  <rect x="372" y="162" width="175" height="28" rx="5" fill="#4a1a0a" stroke="#F0997B" stroke-width="1"/>
  <text x="460" y="180" text-anchor="middle" font-family="monospace" font-size="8" fill="#F5C4B3" font-weight="500">Session memory</text>
  <!-- down arrows to DB -->
  <line x1="274" y1="194" x2="274" y2="218" stroke="#6C63FF" stroke-width="1" stroke-dasharray="3 2"/>
  <polygon points="271,218 274,222 277,218" fill="#6C63FF"/>
  <line x1="460" y1="192" x2="460" y2="218" stroke="#6C63FF" stroke-width="1" stroke-dasharray="3 2"/>
  <polygon points="457,218 460,222 463,218" fill="#6C63FF"/>
  <!-- pgvector DB -->
  <rect x="186" y="222" width="358" height="20" rx="5" fill="#1a1a3a" stroke="#6C63FF" stroke-width="1"/>
  <text x="365" y="235" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#9B8FFF" font-weight="500">PostgreSQL + pgvector — session &amp; spatial index</text>
  <!-- Output panel -->
  <rect x="578" y="46" width="200" height="200" rx="8" fill="#18181E" stroke="#2A2A35" stroke-width="1"/>
  <text x="678" y="65" text-anchor="middle" font-family="monospace" font-size="8" fill="#8B8B95" letter-spacing="1">LIVE OUTPUT</text>
  <line x1="588" y1="72" x2="768" y2="72" stroke="#2A2A35" stroke-width="1"/>
  <rect x="588" y="80" width="180" height="70" rx="4" fill="#0a1a0a" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="678" y="97" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#9FE1CB">📍 Potsdamer Platz,</text>
  <text x="678" y="111" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#9FE1CB">Berlin — public square</text>
  <text x="678" y="125" text-anchor="middle" font-family="monospace" font-size="7" fill="#5DCAA5">hist. significance: high</text>
  <text x="678" y="141" text-anchor="middle" font-family="monospace" font-size="7" fill="#5DCAA5">streaming… ▊</text>
  <rect x="588" y="162" width="180" height="36" rx="4" fill="#0C0C0F" stroke="#2A2A35" stroke-width="0.5"/>
  <text x="678" y="178" text-anchor="middle" font-family="monospace" font-size="7" fill="#6C63FF">What's nearby?</text>
  <text x="678" y="192" text-anchor="middle" font-family="monospace" font-size="7" fill="#00D4AA">→ 3 POIs found ✓</text>
  <rect x="588" y="210" width="180" height="24" rx="4" fill="#1e1e2a" stroke="#2A2A35" stroke-width="0.5"/>
  <text x="678" y="225" text-anchor="middle" font-family="monospace" font-size="7" fill="#8B8B95">conf: 0.93 · latency: 1.2s</text>
  <!-- title badge -->
  <rect x="270" y="263" width="240" height="26" rx="13" fill="#6C63FF" fill-opacity="0.15" stroke="#6C63FF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="390" y="280" text-anchor="middle" font-family="monospace" font-size="10" fill="#6C63FF" letter-spacing="1">LANGGRAPH · CLIP · PGVECTOR</text>
</svg>
