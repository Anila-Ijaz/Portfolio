  <rect x="562" y="44" width="222" height="196" rx="8" fill="#18181E" stroke="#2A2A35" stroke-width="1"/>
  <text x="673" y="63" text-anchor="middle" font-family="monospace" font-size="8" fill="#8B8B95" letter-spacing="1">DEPLOYMENT</text>
  <line x1="572" y1="70" x2="774" y2="70" stroke="#2A2A35" stroke-width="1"/>

