  <rect x="170" y="128" width="173" height="46" rx="5" fill="#1a3a00" stroke="#EF9F27" stroke-width="1"/>
  <text x="257" y="146" text-anchor="middle" font-family="monospace" font-size="8" fill="#FAC775" font-weight="500">Hybrid RRF · top-20</text>
  <text x="257" y="161" text-anchor="middle" font-family="monospace" font-size="7" fill="#EF9F27">Cross-Encoder reranker · top-5</text>

