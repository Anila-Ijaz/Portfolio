  </defs>
  <rect width="800" height="300" fill="url(#bg)"/>

  <!-- Left: Streamlit UI + SEC EDGAR -->
  <rect x="18" y="52" width="118" height="58" rx="7" fill="#1e1929" stroke="#9B8FFF" stroke-width="1.5"/>
