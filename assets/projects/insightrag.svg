<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#131318"/>
      <stop offset="100%" stop-color="#18181E"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bg)"/>

  <!-- Step 1: Query -->
  <rect x="30" y="110" width="120" height="80" rx="8" fill="#1e1e2a" stroke="#6C63FF" stroke-width="1.5"/>
  <text x="90" y="143" text-anchor="middle" font-family="monospace" font-size="9" fill="#9B8FFF" font-weight="600">SEC 10-K</text>
  <text x="90" y="159" text-anchor="middle" font-family="monospace" font-size="8" fill="#8B8B95">Query input</text>
  <text x="90" y="175" text-anchor="middle" font-family="monospace" font-size="7" fill="#6C63FF">Streamlit UI</text>

  <!-- Arrow 1 -->
  <line x1="152" y1="150" x2="188" y2="150" stroke="#6C63FF" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="186,146 194,150 186,154" fill="#6C63FF"/>

  <!-- Step 2: Hybrid Retrieval -->
  <rect x="196" y="90" width="160" height="120" rx="8" fill="#1e1e2a" stroke="#00D4AA" stroke-width="1.5"/>
  <text x="276" y="113" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D4AA" font-weight="600">Hybrid Retrieval</text>
  <line x1="210" y1="120" x2="342" y2="120" stroke="#1a3a3a" stroke-width="1"/>
  <text x="276" y="138" text-anchor="middle" font-family="monospace" font-size="8" fill="#9FE1CB">Qdrant (dense)</text>
  <text x="276" y="154" text-anchor="middle" font-family="monospace" font-size="8" fill="#9FE1CB">BM25 (sparse)</text>
  <text x="276" y="172" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#5DCAA5">RRF fusion · top-20</text>
  <text x="276" y="188" text-anchor="middle" font-family="monospace" font-size="7" fill="#8B8B95">Cross-encoder rerank</text>

  <!-- Arrow 2 -->
  <line x1="358" y1="150" x2="394" y2="150" stroke="#00D4AA" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="392,146 400,150 392,154" fill="#00D4AA"/>

  <!-- Step 3: LLM -->
  <rect x="402" y="110" width="130" height="80" rx="8" fill="#1e1e2a" stroke="#00D4AA" stroke-width="1.5"/>
  <text x="467" y="135" text-anchor="middle" font-size="18">🧠</text>
  <text x="467" y="158" text-anchor="middle" font-family="monospace" font-size="9" fill="#8B8B95">LLM</text>
  <text x="467" y="174" text-anchor="middle" font-family="monospace" font-size="8" fill="#00D4AA">+ Context + Citation</text>

  <!-- Arrow 3 -->
  <line x1="534" y1="150" x2="570" y2="150" stroke="#00D4AA" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="568,146 576,150 568,154" fill="#00D4AA"/>

  <!-- Step 4: Answer -->
  <rect x="578" y="90" width="188" height="120" rx="8" fill="#1e1e2a" stroke="#2A2A35" stroke-width="1"/>
  <text x="672" y="113" text-anchor="middle" font-family="monospace" font-size="9" fill="#8B8B95">GROUNDED ANSWER</text>
  <line x1="592" y1="120" x2="752" y2="120" stroke="#2A2A35" stroke-width="1"/>
  <text x="596" y="139" font-family="monospace" font-size="8" fill="#EAEAEC">Answer: "..."</text>
  <text x="596" y="156" font-family="monospace" font-size="8" fill="#8B8B95">Source: 10-K_AAPL.pdf</text>
  <text x="596" y="172" font-family="monospace" font-size="8" fill="#8B8B95">Confidence: 0.94</text>
  <text x="596" y="190" font-family="monospace" font-size="7" fill="#6C63FF">AWS EC2 · Frankfurt</text>

  <!-- Title badge -->
  <rect x="240" y="248" width="310" height="28" rx="14" fill="#00D4AA" fill-opacity="0.12" stroke="#00D4AA" stroke-width="1" stroke-opacity="0.4"/>
  <text x="395" y="267" text-anchor="middle" font-family="monospace" font-size="11" fill="#00D4AA" letter-spacing="1">HYBRID RAG · QDRANT · BGE · RAGAS</text>
</svg>
