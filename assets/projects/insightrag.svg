  <rect x="572" y="138" width="202" height="24" rx="5" fill="#1a1a2e" stroke="#6C63FF" stroke-width="0.8"/>
  <text x="673" y="154" text-anchor="middle" font-family="monospace" font-size="8" fill="#9B8FFF">🗄 Qdrant · vector store</text>

  <!-- GitHub Actions -->
  <rect x="572" y="168" width="202" height="24" rx="5" fill="#1a1a2e" stroke="#9B8FFF" stroke-width="0.8"/>
  <text x="673" y="184" text-anchor="middle" font-family="monospace" font-size="8" fill="#9B8FFF">⚙ GitHub Actions CI/CD</text>

  <line x1="572" y1="202" x2="774" y2="202" stroke="#2A2A35" stroke-width="1"/>
  <text x="673" y="216" text-anchor="middle" font-family="monospace" font-size="7" fill="#8B8B95">25 tests · RAGAS eval · GHCR</text>
  <text x="673" y="229" text-anchor="middle" font-family="monospace" font-size="7" fill="#6C63FF">Elastic IP · API-key auth · live demo</text>

  <!-- Badge -->
  <rect x="196" y="256" width="354" height="26" rx="13" fill="#4A90D9" fill-opacity="0.15" stroke="#4A90D9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="373" y="273" text-anchor="middle" font-family="monospace" font-size="10" fill="#4A90D9" letter-spacing="1">HYBRID RAG · QDRANT · BGE · RAGAS</text>
