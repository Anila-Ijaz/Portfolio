  <line x1="170" y1="59" x2="536" y2="59" stroke="#1a4a6a" stroke-width="1"/>

  <!-- TL: Ingestion pipeline -->
  <rect x="170" y="66" width="173" height="46" rx="5" fill="#083a2a" stroke="#5DCAA5" stroke-width="1"/>
