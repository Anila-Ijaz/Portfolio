  <text x="77" y="86" text-anchor="middle" font-family="monospace" font-size="7" fill="#8B8B95">chat · citations</text>
  <text x="77" y="99" text-anchor="middle" font-family="monospace" font-size="7" fill="#8B8B95">live latency panel</text>

  <rect x="18" y="126" width="118" height="42" rx="7" fill="#1a1a2e" stroke="#6C63FF" stroke-width="1.2"/>
